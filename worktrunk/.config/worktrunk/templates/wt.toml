# .config/wt.toml - Rails 8 project template for Worktrunk
#
# Reference profile: obra (Rails 8.1, Postgres, bin/dev + Procfile.dev).
# Copy into a Rails repo as .config/wt.toml and commit it.
#
# This template assumes your user config already provides:
#   - worktree-path
#   - pre-start copy = "wt step copy-ignored"
#
# Result:
#   - deterministic app and db ports per branch
#   - isolated Postgres container per worktree
#   - generated .env.local per worktree
#   - Rails pre-merge quality gate

[list]
url = "http://localhost:{{ branch | hash_port }}"

[pre-start]
# Write per-worktree env values used by bin/dev and config/database.yml.
env = """
cat > .env.local << 'EOF'
PORT={{ branch | hash_port }}
DATABASE_HOST=localhost
DATABASE_PORT={{ ('db-' ~ branch) | hash_port }}
DATABASE_USERNAME=postgres
DATABASE_PASSWORD=dev
DATABASE_NAME={{ branch | sanitize_db }}
DATABASE_URL=postgres://postgres:dev@localhost:{{ ('db-' ~ branch) | hash_port }}/{{ branch | sanitize_db }}
EOF
"""

[post-start]
# Start branch-isolated postgres and wait until it accepts connections.
db = """
if ! docker container inspect {{ repo }}-{{ branch | sanitize }}-postgres >/dev/null 2>&1; then
  docker run -d --rm \
    --name {{ repo }}-{{ branch | sanitize }}-postgres \
    -p {{ ('db-' ~ branch) | hash_port }}:5432 \
    -e POSTGRES_DB={{ branch | sanitize_db }} \
    -e POSTGRES_USER=postgres \
    -e POSTGRES_PASSWORD=dev \
    postgres:16-alpine
fi

for _ in $(seq 1 60); do
  if docker exec {{ repo }}-{{ branch | sanitize }}-postgres pg_isready -U postgres >/dev/null 2>&1; then
    break
  fi
  sleep 1
done
"""

# Use PORT from .env.local. In obra, Procfile.dev pins 3000, so make sure
# Procfile.dev uses ${PORT:-3000} for web if you want true per-worktree ports.
app = """
PORT={{ branch | hash_port }} \
DATABASE_HOST=localhost \
DATABASE_PORT={{ ('db-' ~ branch) | hash_port }} \
DATABASE_USERNAME=postgres \
DATABASE_PASSWORD=dev \
DATABASE_NAME={{ branch | sanitize_db }} \
DATABASE_URL=postgres://postgres:dev@localhost:{{ ('db-' ~ branch) | hash_port }}/{{ branch | sanitize_db }} \
bin/rails db:prepare && \
PORT={{ branch | hash_port }} \
DATABASE_HOST=localhost \
DATABASE_PORT={{ ('db-' ~ branch) | hash_port }} \
DATABASE_USERNAME=postgres \
DATABASE_PASSWORD=dev \
DATABASE_NAME={{ branch | sanitize_db }} \
DATABASE_URL=postgres://postgres:dev@localhost:{{ ('db-' ~ branch) | hash_port }}/{{ branch | sanitize_db }} \
bin/dev
"""

[pre-merge]
# Rails 8 quality gate similar to obra tooling.
lint = "bin/rubocop"
security = "bin/brakeman -q"
test = "bin/rails test"

[post-remove]
stop-app = "lsof -ti :{{ branch | hash_port }} -sTCP:LISTEN | xargs kill 2>/dev/null || true"
stop-db = "docker stop {{ repo }}-{{ branch | sanitize }}-postgres 2>/dev/null || true"
