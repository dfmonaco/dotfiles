# .config/wt.toml — Project config for Worktrunk
# Commit this file to version control so the whole team shares it.
# Generate with: wt config create --project
#
# Template — copy to your project root at .config/wt.toml and adjust:
#   cp ~/.config/worktrunk/templates/wt.toml .config/wt.toml
#
# The user config (~/.config/worktrunk/config.toml) already handles:
#   - worktree path layout
#   - cold-start file copying (wt step copy-ignored)
#   - LLM commit generation
#
# This file adds the project-specific lifecycle: dev server + postgres per
# worktree, local CI gate, and the wt list URL column.

# ---------------------------------------------------------------------------
# wt list — show the dev server URL for this worktree
# The URL dims when the port is not listening.
# ---------------------------------------------------------------------------
[list]
url = "http://localhost:{{ branch | hash_port }}"

# ---------------------------------------------------------------------------
# pre-start — runs BEFORE the worktree is handed to the developer.
# Blocking — failure prevents the worktree from being used.
#
# Generate .env.local with the correct DATABASE_URL and DEV_PORT so that
# every tool (test runner, migration cli, app) automatically picks up the
# right values for this worktree.
#
# ('db-' ~ branch) concatenates before hashing so the db port and dev
# server port are always different even for the same branch.
# ---------------------------------------------------------------------------
[pre-start]
env = """
cat > .env.local << 'EOF'
DATABASE_URL=postgres://postgres:dev@localhost:{{ ('db-' ~ branch) | hash_port }}/{{ branch | sanitize_db }}
DEV_PORT={{ branch | hash_port }}
EOF
"""

# ---------------------------------------------------------------------------
# post-start — runs in the background after the worktree is ready.
# All commands here run concurrently — dev server + postgres start in parallel.
# ---------------------------------------------------------------------------
[post-start]
# Start a dedicated Postgres container for this worktree.
# Container name is unique per repo+branch so multiple projects don't clash.
# The database name uses sanitize_db (lowercase, underscores, hash suffix)
# to avoid SQL reserved words and collisions.
db = """
docker run -d --rm \
  --name {{ repo }}-{{ branch | sanitize }}-postgres \
  -p {{ ('db-' ~ branch) | hash_port }}:5432 \
  -e POSTGRES_DB={{ branch | sanitize_db }} \
  -e POSTGRES_USER=postgres \
  -e POSTGRES_PASSWORD=dev \
  postgres:16-alpine
"""

# Start the dev server on a deterministic port derived from the branch name.
# Replace `npm run dev` with your project's actual command.
server = "npm run dev -- --port {{ branch | hash_port }}"

# ---------------------------------------------------------------------------
# pre-merge — local CI gate. Runs after rebase, before the merge commit.
# Failure aborts the merge. Adjust to your project's commands.
# ---------------------------------------------------------------------------
[pre-merge]
lint    = "npm run lint"
test    = "npm test"

# ---------------------------------------------------------------------------
# pre-remove / post-remove — stop the dev server and drop the postgres
# container when the worktree is removed (after wt merge or wt remove).
#
# pre-remove runs inside the worktree (files still present).
# post-remove runs after deletion (uses template vars to identify resources).
# Using post-remove for both so they run in the background and don't block.
# ---------------------------------------------------------------------------
[post-remove]
stop-server = "lsof -ti :{{ branch | hash_port }} -sTCP:LISTEN | xargs kill 2>/dev/null || true"
stop-db     = "docker stop {{ repo }}-{{ branch | sanitize }}-postgres 2>/dev/null || true"
