# ----------------------------------------------------- 
# Monitor Setup - Automatic Detection
# name: "Default"
# ----------------------------------------------------- 
# This configuration automatically adapts to:
# - Laptop only (undocked)
# - Laptop + 2 external monitors (docked)
# ----------------------------------------------------- 

# External monitors (only active when connected)
# Left monitor - 1080p at position (0,0)
monitor = DP-5, 1920x1080@60, 0x0, 1

# Right monitor - 1080p at position (1920,0) - right of DP-5
monitor = DP-6, 1920x1080@60, 1920x0, 1

# Laptop screen - high-res display
# When docked: positioned at (0, 1080) centered below external monitors
# When undocked: this becomes the primary (and only) display
monitor = eDP-1, 2880x1800@60, 0x1080, 1.5

# Fallback: any unspecified monitor uses preferred resolution
monitor = , preferred, auto, 1
