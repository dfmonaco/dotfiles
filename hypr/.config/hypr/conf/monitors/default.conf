# ----------------------------------------------------- 
# Monitor Setup - Docked Layout
# name: "Default"
# ----------------------------------------------------- 
# Uses stable monitor descriptions for the two external displays because
# dock reconnects can renumber DP-* outputs.
# ----------------------------------------------------- 

# Left monitor - 1080p at position (0,0)
monitor = desc:Creatix Polymedia GmbH ND215 NX181101382, 1920x1080@60, 0x0, 1

# Right monitor - 1080p at position (1920,0)
monitor = desc:Creatix Polymedia GmbH ND215 NX181101380, 1920x1080@60, 1920x0, 1

# Laptop screen - centered below the two external monitors when docked.
# When undocked, it becomes the only active display.
monitor = eDP-1, 2880x1800@60, 480x1080, 1.5

# Fallback for any other display.
monitor = , preferred, auto, 1
