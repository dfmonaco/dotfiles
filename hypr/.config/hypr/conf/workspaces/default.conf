# ----------------------------------------------------- 
# Workspace Rules - Automatic Monitor Assignment
# name: "Default"
# ----------------------------------------------------- 

# When docked (3 monitors):
# DP-5 (left external): workspaces 1-3
# DP-6 (right external): workspaces 4-6  
# eDP-1 (laptop): workspaces 7-9
#
# When undocked (laptop only):
# eDP-1: all workspaces default to laptop screen

# Left external monitor (DP-5) - Primary work area
workspace = 1, monitor:DP-5, default:true
workspace = 2, monitor:DP-5
workspace = 3, monitor:DP-5

# Right external monitor (DP-6) - Secondary work area
workspace = 4, monitor:DP-6, default:true
workspace = 5, monitor:DP-6
workspace = 6, monitor:DP-6

# Laptop screen (eDP-1) - Communication/monitoring
workspace = 7, monitor:eDP-1, default:true
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1

# Additional workspaces (10+) can be accessed on any monitor
# No explicit assignment allows them to follow focus

# Example advanced rules (commented out, uncomment to use):
# workspace = name:coding, monitor:DP-5, gapsin:5, gapsout:10
# workspace = name:browser, monitor:DP-6, default:true
# workspace = name:chat, monitor:eDP-1, default:true
# workspace = special:scratchpad, on-created-empty:kitty
