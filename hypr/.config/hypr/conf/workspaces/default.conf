# ----------------------------------------------------- 
# Workspace Rules - Docked Layout
# name: "Default"
# ----------------------------------------------------- 

# When docked (3 monitors):
# Left external: workspaces 1-2
# Right external: workspaces 3-4
# eDP-1 (laptop): workspace 5
#
# When undocked (laptop only):
# eDP-1: workspaces 1-5 default to laptop screen

# Left external monitor - Primary work area
workspace = 1, monitor:desc:Creatix Polymedia GmbH ND215 NX181101382, default:true
workspace = 2, monitor:desc:Creatix Polymedia GmbH ND215 NX181101382

# Right external monitor - Secondary work area
workspace = 3, monitor:desc:Creatix Polymedia GmbH ND215 NX181101380, default:true
workspace = 4, monitor:desc:Creatix Polymedia GmbH ND215 NX181101380

# Laptop screen - Communication/monitoring
workspace = 5, monitor:eDP-1, default:true

# Workspaces 6+ are left unpinned and can follow focus.
